name: Build and Release Contracts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust and wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build all contracts
        run: |
          cargo build --target wasm32-unknown-unknown \
            --release -p parameters-contract
          cargo build --target wasm32-unknown-unknown \
            --release -p reputation-contract
          cargo build --target wasm32-unknown-unknown \
            --release -p vendor-registry-contract
          cargo build --target wasm32-unknown-unknown \
            --release -p liquidity-pool-contract
          cargo build --target wasm32-unknown-unknown \
            --release -p creditline-contract

      - name: Generate SHA256 hashes
        run: |
          sha256sum \
            target/wasm32-unknown-unknown/release/parameters_contract.wasm \
            target/wasm32-unknown-unknown/release/reputation_contract.wasm \
            target/wasm32-unknown-unknown/release/vendor_registry_contract.wasm \
            target/wasm32-unknown-unknown/release/liquidity_pool_contract.wasm \
            target/wasm32-unknown-unknown/release/creditline_contract.wasm

      - name: Delete existing release if exists
        run: gh release delete ${{ github.ref_name }} --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            target/wasm32-unknown-unknown/release/parameters_contract.wasm \
            target/wasm32-unknown-unknown/release/reputation_contract.wasm \
            target/wasm32-unknown-unknown/release/vendor_registry_contract.wasm \
            target/wasm32-unknown-unknown/release/liquidity_pool_contract.wasm \
            target/wasm32-unknown-unknown/release/creditline_contract.wasm \
            --title "StepFi Contracts ${{ github.ref_name }}" \
            --notes "StepFi Protocol smart contracts compiled from source. See VERIFICATION.md for hash verification instructions."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
